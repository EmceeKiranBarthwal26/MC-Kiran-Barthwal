<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>MC Portfolio</title>
</head>
<body>
    <!-- Hero Section -->
    <div class="hero">
        <video autoplay muted loop>
            <source src="path/to/video.mp4" type="video/mp4">
            Your browser does not support HTML video.
        </video>
        <div class="hero-content">
            <h1>Welcome to My Portfolio</h1>
            <p>Expert MC for Your Event</p>
        </div>
    </div>
    
    <!-- About Section -->
    <section class="about">
        <h2>About Me</h2>
        <p>Information about the MC goes here...</p>
    </section>
    
    <!-- Services Section -->
    <section class="services">
        <h2>Services</h2>
        <ul>
            <li>Service 1</li>
            <li>Service 2</li>
            <li>Service 3</li>
        </ul>
    </section>
    
    <!-- Gallery Section -->
    <section class="gallery">
        <h2>Gallery</h2>
        <div class="gallery-images">
            <img src="path/to/image1.jpg" alt="Gallery Image 1">
            <img src="path/to/image2.jpg" alt="Gallery Image 2">  
        </div>
    </section>
    
    <!-- Achievements Section -->
    <section class="achievements">
        <h2>Achievements</h2>
        <div class="counters">
            <div class="counter">
                <span id="counter1">0</span>
                <p>Events Held</p>
            </div>
        </div>
    </section>
    
    <!-- Testimonials Section -->
    <section class="testimonials">
        <h2>Testimonials</h2>
        <div class="testimonials-carousel">
            <div class="testimonial">
                <p>Testimonial 1</p>
            </div>
        </div>
    </section>
    
    <!-- Contact Form Section -->
    <section class="contact">
        <h2>Contact Me</h2>
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>
    <script src="js/main.js"></script>
</body>
</html>
